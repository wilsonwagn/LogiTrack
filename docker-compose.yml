version: '3.8'

services:

  postgres:
    image: postgres:15-alpine
    container_name: logitrack-db
    environment:
      POSTGRES_DB: logitrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./BACKEND
    container_name: logitrack-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/logitrack
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: logitrack-jwt-secret-key-2024-production-safe
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./FRONTEND
    container_name: logitrack-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
