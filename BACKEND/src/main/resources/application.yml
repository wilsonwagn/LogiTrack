spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/logitrack}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: never

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:bG9naXRyYWNrLXNlY3JldC1rZXktMjAyNC1tdXN0LWJlLWF0LWxlYXN0LTI1Ni1iaXRzLWxvbmc=}
    expiration: 86400000

logging:
  level:
    br.com.logitrack: INFO
