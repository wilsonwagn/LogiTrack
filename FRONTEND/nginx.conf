server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        # Necessário para React Router funcionar com refresh de página
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso para a API em produção (quando ambos no mesmo Docker)
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
